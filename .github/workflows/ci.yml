name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - citadel-gateway
          - citadel-vector
          - citadel-agents
          - citadel-ingest
          - citadel-trace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: pip install -e "packages/${{ matrix.package }}[dev]"
      - name: Run tests
        run: cd packages/${{ matrix.package }} && pytest --tb=short -q
