version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: packages/citadel-gateway/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  trace:
    build:
      context: .
      dockerfile: packages/citadel-trace/Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    environment:
      - TRACE_DB_PATH=/app/data/traces.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./packages/citadel-dashboard:/usr/share/nginx/html:ro
    depends_on:
      - gateway
      - trace
    restart: unless-stopped
