[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "citadel-gateway"
version = "0.1.0"
description = "LLM gateway proxy -- route, cache, rate-limit, and failover across Claude, Gemini, Ollama"
authors = [{name = "Donald Havery", email = "dbhavery@users.noreply.github.com"}]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "httpx>=0.28",
    "pydantic>=2.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.50"]
all = ["anthropic>=0.50"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.26"]

[project.scripts]
citadel-gateway = "citadel_gateway.server:main"

[tool.setuptools.packages.find]
include = ["citadel_gateway*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
