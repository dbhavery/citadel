[project]
name = "citadel-vector"
version = "0.1.0"
description = "Vector search engine with HNSW indexing -- from-scratch implementation, no FAISS/ChromaDB dependency"
authors = [{name = "Donald Havery", email = "dbhavery@gmail.com"}]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
server = ["fastapi>=0.115", "uvicorn>=0.34"]
dev = ["pytest>=8.0"]

[project.scripts]
citadel-vector = "citadel_vector.server:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"
