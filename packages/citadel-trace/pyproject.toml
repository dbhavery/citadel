[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "citadel-trace"
version = "0.1.0"
description = "LLM observability -- auto-instrument SDKs, trace calls, track costs, monitor latency"
authors = [{name = "Donald Havery", email = "dbhavery@users.noreply.github.com"}]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
server = ["fastapi>=0.115", "uvicorn>=0.34"]
instrument = ["httpx>=0.28"]
all = ["fastapi>=0.115", "uvicorn>=0.34", "httpx>=0.28"]
dev = ["pytest>=8.0"]

[project.scripts]
citadel-trace = "citadel_trace.server:main"

[tool.setuptools.packages.find]
include = ["citadel_trace*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
